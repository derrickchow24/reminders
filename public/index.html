<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reminders</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .header {
      margin-bottom: 36px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #fff;
    }

    .header p {
      font-size: 14px;
      color: #555;
      margin-top: 4px;
    }

    .add-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .add-card label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    input[type="date"] {
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      flex-shrink: 0;
      width: 155px;
      transition: border-color 0.15s;
      color-scheme: dark;
    }

    input[type="text"] {
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      flex: 1;
      transition: border-color 0.15s;
    }

    input[type="date"]:focus,
    input[type="text"]:focus {
      border-color: #444;
    }

    input::placeholder { color: #3a3a3a; }

    .add-btn {
      width: 100%;
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .add-btn:hover { background: #e8e8e8; }
    .add-btn:active { transform: scale(0.99); }

    .add-btn:disabled {
      background: #2a2a2a;
      color: #444;
      cursor: not-allowed;
    }

    .test-btn {
      width: 100%;
      background: transparent;
      color: #444;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }
    .test-btn:hover { border-color: #444; color: #888; }

    /* List section */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .list-header h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #444;
    }

    .count-badge {
      font-size: 12px;
      font-weight: 600;
      color: #333;
    }

    .month-group {
      margin-bottom: 20px;
    }

    .month-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .reminder-item {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 13px 16px;
      margin-bottom: 6px;
      gap: 14px;
      transition: border-color 0.15s;
    }

    .reminder-item:hover { border-color: #333; }

    .r-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      flex-shrink: 0;
      opacity: 0.3;
    }

    .r-date {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      width: 28px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .r-label {
      font-size: 14px;
      color: #d0d0d0;
      flex: 1;
    }

    .r-del {
      color: #2e2e2e;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: color 0.15s;
      user-select: none;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .r-del:hover { color: #e05252; }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: #2e2e2e;
      font-size: 14px;
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e1e;
      border: 1px solid #333;
      color: #f0f0f0;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 100px;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .loading { color: #333; font-size: 13px; padding: 32px 0; text-align: center; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Reminders</h1>
    <p>Texts you at 8am on the day, every year.</p>
  </div>

  <div class="add-card">
    <label>Add a reminder</label>
    <div class="input-row">
      <input type="date" id="date-input" />
      <input type="text" id="event-input" placeholder="e.g. Mom's birthday" />
    </div>
    <button class="add-btn" id="add-btn" onclick="addReminder()">Add Reminder</button>
      <button class="test-btn" id="test-btn" onclick="sendTest()">Send test text to 650-296-2919</button>
  </div>

  <div class="list-header">
    <h2>Scheduled</h2>
    <span class="count-badge" id="count"></span>
  </div>

  <div id="reminder-list">
    <div class="loading">Loading...</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let reminders = [];

  async function load() {
    try {
      const res = await fetch('/api/reminders');
      reminders = await res.json();
      render();
    } catch {
      document.getElementById('reminder-list').innerHTML = '<div class="empty-state"><div>Could not load reminders.</div></div>';
    }
  }

  async function addReminder() {
    const dateVal = document.getElementById('date-input').value;
    const label = document.getElementById('event-input').value.trim();
    if (!dateVal || !label) { showToast('Enter a date and event name.'); return; }

    const [year, month, day] = dateVal.split('-').map(Number);
    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const res = await fetch('/api/reminders/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ month, day, label })
      });
      const data = await res.json();
      reminders = data.reminders;
      document.getElementById('date-input').value = '';
      document.getElementById('event-input').value = '';
      render();
      showToast(`✓ Added — ${MONTHS[month-1]} ${day}`);
    } catch {
      showToast('Something went wrong.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Reminder';
    }
  }

  async function deleteReminder(month, day, label) {
    try {
      const res = await fetch('/api/reminders/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ month, day, label })
      });
      const data = await res.json();
      reminders = data.reminders;
      render();
      showToast('Removed');
    } catch {
      showToast('Could not remove.');
    }
  }

  function render() {
    const list = document.getElementById('reminder-list');
    const count = document.getElementById('count');

    count.textContent = reminders.length ? `${reminders.length} total` : '';

    if (!reminders.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🔔</div><div>No reminders yet.</div></div>`;
      return;
    }

    // Group by month
    const groups = {};
    reminders.forEach(r => {
      if (!groups[r.month]) groups[r.month] = [];
      groups[r.month].push(r);
    });

    list.innerHTML = Object.entries(groups).map(([m, items]) => `
      <div class="month-group">
        <div class="month-label">${MONTHS_FULL[m-1]}</div>
        ${items.map(r => `
          <div class="reminder-item">
            <div class="r-dot"></div>
            <div class="r-date">${r.day}</div>
            <div class="r-label">${r.label}</div>
            <div class="r-del" onclick="deleteReminder(${r.month}, ${r.day}, ${JSON.stringify(r.label)})">×</div>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  async function sendTest() {
    const btn = document.getElementById("test-btn");
    btn.disabled = true;
    btn.textContent = "Sending...";
    try {
      const res = await fetch("/api/test", { method: "POST" });
      const data = await res.json();
      if (data.success) showToast("✓ Text sent to 650-296-2919!");
      else showToast("Failed: " + data.error);
    } catch { showToast("Something went wrong."); }
    finally { btn.disabled = false; btn.textContent = "Send test text to 650-296-2919"; }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') addReminder();
  });

  load();
</script>
</body>
</html>
